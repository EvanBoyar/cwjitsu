name: Build Release APK

# Build an installable APK whenever a version tag (e.g. v0.1.10) is pushed,
# and attach it to a GitHub Release for that tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Restore the shared signing keystore from the encrypted repository
      # secret so this build is signed with the same key as local builds -
      # otherwise the released APK can't install over an adb-installed one.
      # Decoded OUTSIDE the checkout, onto the ephemeral runner's temp dir.
      - name: Restore signing keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/debug.keystore"
          echo "CWJITSU_KEYSTORE=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/cwjitsu-${GITHUB_REF_NAME}.apk"

      - name: Upload APK to the release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/cwjitsu-*.apk
          generate_release_notes: true
